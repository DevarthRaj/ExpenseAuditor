<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Expense Auditor</title>
  <meta name="description" content="Sign in or create an account to access the Expense Auditor portal." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: {
            'fade-in-up': 'fadeInUp 0.5s ease-out',
            'float': 'float 6s ease-in-out infinite',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
          },
          keyframes: {
            fadeInUp: { '0%': { opacity: '0', transform: 'translateY(24px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-12px)' } },
            pulseGlow: { '0%,100%': { boxShadow: '0 0 0 0 rgba(99,102,241,0.4)' }, '50%': { boxShadow: '0 0 0 14px rgba(99,102,241,0)' } },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .tab-active { background: rgba(99,102,241,0.25); color: #a5b4fc; border-bottom: 2px solid #818cf8; }
    .tab-inactive { color: #64748b; border-bottom: 2px solid transparent; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 100px rgba(255,255,255,0.04) inset !important; -webkit-text-fill-color: #fff !important; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 text-white flex items-center justify-center p-4">

  <!-- Background orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-indigo-600 rounded-full opacity-10 blur-3xl animate-float"></div>
    <div class="absolute top-1/3 -right-32 w-80 h-80 bg-blue-600 rounded-full opacity-10 blur-3xl animate-float" style="animation-delay:2s"></div>
    <div class="absolute -bottom-24 left-1/2 w-72 h-72 bg-violet-600 rounded-full opacity-10 blur-3xl animate-float" style="animation-delay:4s"></div>
  </div>

  <div class="relative z-10 w-full max-w-md animate-fade-in-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-2xl shadow-2xl mb-4 animate-float">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-white">ExpenseAuditor</h1>
      <p class="text-slate-400 text-sm mt-1">AI-Powered Compliance Platform</p>
    </div>

    <!-- Card -->
    <div class="glass rounded-2xl shadow-2xl overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-white/10">
        <button id="tabLogin" onclick="switchTab('login')"
          class="flex-1 py-4 text-sm font-semibold transition-all tab-active">
          Sign In
        </button>
        <button id="tabRegister" onclick="switchTab('register')"
          class="flex-1 py-4 text-sm font-semibold transition-all tab-inactive">
          Create Account
        </button>
      </div>

      <!-- Login Form -->
      <div id="loginPanel" class="p-8">
        <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
            <input id="loginUsername" type="text" required placeholder="Enter your username"
              class="w-full bg-white/5 border border-white/15 rounded-xl px-4 py-3 text-white placeholder-slate-500
                     focus:border-indigo-500 focus:bg-white/8 transition-all duration-200 text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
            <div class="relative">
              <input id="loginPassword" type="password" required placeholder="Enter your password"
                class="w-full bg-white/5 border border-white/15 rounded-xl px-4 py-3 pr-11 text-white placeholder-slate-500
                       focus:border-indigo-500 focus:bg-white/8 transition-all duration-200 text-sm" />
              <button type="button" onclick="togglePwd('loginPassword', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="loginError" class="hidden text-sm text-red-400 bg-red-900/20 border border-red-500/30 rounded-xl px-4 py-3"></div>
          <button type="submit" id="loginBtn"
            class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500
                   text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-lg
                   hover:shadow-indigo-500/30 hover:shadow-xl active:scale-[0.99] animate-pulse-glow text-sm">
            <span id="loginBtnText">Sign In</span>
            <span id="loginBtnLoad" class="hidden">
              <svg class="w-4 h-4 animate-spin inline mr-2" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
              </svg>Signing in...
            </span>
          </button>
          <p class="text-center text-xs text-slate-500 pt-1">
            Admin? Use <span class="text-indigo-400 font-mono">admin</span> / <span class="text-indigo-400 font-mono">admin123</span>
          </p>
        </form>
      </div>

      <!-- Register Form -->
      <div id="registerPanel" class="p-8 hidden">
        <form id="registerForm" class="space-y-5" onsubmit="handleRegister(event)">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
            <input id="regUsername" type="text" required placeholder="Choose a username (min 3 chars)"
              class="w-full bg-white/5 border border-white/15 rounded-xl px-4 py-3 text-white placeholder-slate-500
                     focus:border-indigo-500 focus:bg-white/8 transition-all duration-200 text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Work Email</label>
            <input id="regEmail" type="email" required placeholder="you@company.com"
              class="w-full bg-white/5 border border-white/15 rounded-xl px-4 py-3 text-white placeholder-slate-500
                     focus:border-indigo-500 focus:bg-white/8 transition-all duration-200 text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
            <div class="relative">
              <input id="regPassword" type="password" required placeholder="Min 6 characters"
                class="w-full bg-white/5 border border-white/15 rounded-xl px-4 py-3 pr-11 text-white placeholder-slate-500
                       focus:border-indigo-500 focus:bg-white/8 transition-all duration-200 text-sm" />
              <button type="button" onclick="togglePwd('regPassword', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Confirm Password</label>
            <input id="regConfirm" type="password" required placeholder="Repeat password"
              class="w-full bg-white/5 border border-white/15 rounded-xl px-4 py-3 text-white placeholder-slate-500
                     focus:border-indigo-500 focus:bg-white/8 transition-all duration-200 text-sm" />
          </div>
          <div id="regError" class="hidden text-sm text-red-400 bg-red-900/20 border border-red-500/30 rounded-xl px-4 py-3"></div>
          <button type="submit" id="regBtn"
            class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500
                   text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-lg
                   hover:shadow-indigo-500/30 hover:shadow-xl active:scale-[0.99] text-sm">
            <span id="regBtnText">Create Account</span>
            <span id="regBtnLoad" class="hidden">
              <svg class="w-4 h-4 animate-spin inline mr-2" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
              </svg>Creating account...
            </span>
          </button>
        </form>
      </div>
    </div>

    <!-- Trust badges -->
    <div class="mt-6 flex items-center justify-center gap-6 text-xs text-slate-600">
      <span class="flex items-center gap-1.5">🔒 Encrypted</span>
      <span class="flex items-center gap-1.5">🏢 On-premise</span>
      <span class="flex items-center gap-1.5">⚡ AI-powered</span>
    </div>
  </div>

  <script>
    // ── Redirect if already logged in ──────────────────────────────────────────
    const token = localStorage.getItem('ea_token');
    const role  = localStorage.getItem('ea_role');
    if (token && role) {
      window.location.href = role === 'admin' ? '/dashboard' : '/portal';
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginPanel').classList.toggle('hidden', !isLogin);
      document.getElementById('registerPanel').classList.toggle('hidden', isLogin);
      document.getElementById('tabLogin').className = `flex-1 py-4 text-sm font-semibold transition-all ${isLogin ? 'tab-active' : 'tab-inactive'}`;
      document.getElementById('tabRegister').className = `flex-1 py-4 text-sm font-semibold transition-all ${!isLogin ? 'tab-active' : 'tab-inactive'}`;
    }

    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showError(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError(elId) {
      document.getElementById(elId).classList.add('hidden');
    }

    function saveSession(data) {
      localStorage.setItem('ea_token', data.token);
      localStorage.setItem('ea_role', data.role);
      localStorage.setItem('ea_username', data.username);
      localStorage.setItem('ea_user_id', data.user_id);
      localStorage.setItem('ea_email', data.email || '');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError('loginError');
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      document.getElementById('loginBtnText').classList.add('hidden');
      document.getElementById('loginBtnLoad').classList.remove('hidden');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        saveSession(data);
        window.location.href = data.role === 'admin' ? '/dashboard' : '/portal';
      } catch (err) {
        showError('loginError', err.message);
      } finally {
        btn.disabled = false;
        document.getElementById('loginBtnText').classList.remove('hidden');
        document.getElementById('loginBtnLoad').classList.add('hidden');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError('regError');
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirm').value;
      if (password !== confirm) { showError('regError', 'Passwords do not match'); return; }

      const btn = document.getElementById('regBtn');
      btn.disabled = true;
      document.getElementById('regBtnText').classList.add('hidden');
      document.getElementById('regBtnLoad').classList.remove('hidden');

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            password,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Registration failed');
        saveSession({ ...data, email: document.getElementById('regEmail').value });
        window.location.href = '/portal';
      } catch (err) {
        showError('regError', err.message);
      } finally {
        btn.disabled = false;
        document.getElementById('regBtnText').classList.remove('hidden');
        document.getElementById('regBtnLoad').classList.add('hidden');
      }
    }
  </script>
</body>
</html>
