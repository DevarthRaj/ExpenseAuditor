<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Employees | Expense Auditor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; overflow: hidden; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white flex">

  <!-- Sidebar -->
  <aside class="w-64 border-r border-white/5 flex flex-col glass z-20">
    <div class="p-6">
      <div class="flex items-center gap-3 mb-8">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">E</div>
        <span class="font-bold tracking-tight text-lg">Auditor<span class="text-blue-500">.</span></span>
      </div>
      <nav class="space-y-1">
        <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          All Claims
        </a>
        <a href="/employees" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-600/20 text-blue-300 text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          Employees
        </a>
        <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:text-red-400 hover:bg-red-500/10 text-sm transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Logout
        </button>
      </nav>
    </div>
    <div class="mt-auto p-6 border-t border-white/5">
      <div class="flex items-center gap-3">
        <div id="adminAvatar" class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs font-bold">A</div>
        <div>
          <p id="adminName" class="text-xs font-medium text-white truncate w-32">Admin</p>
          <p class="text-[10px] text-slate-500">Finance Team</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-screen relative">
    <header class="p-6 border-b border-white/5 flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-bold">Employee Directory</h2>
        <p class="text-slate-400 text-sm">View registered employees and their claim history.</p>
      </div>
      <div class="flex gap-3">
        <button onclick="loadUsers()" class="px-4 py-2 border border-white/10 rounded-xl text-sm hover:bg-white/5 transition-colors flex items-center gap-2">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
           Refresh List
        </button>
      </div>
    </header>

    <div class="flex-1 p-6 overflow-hidden">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
        <!-- User List Column -->
        <div class="lg:col-span-4 h-full flex flex-col overflow-hidden">
          <div id="userList" class="flex-1 space-y-3 overflow-y-auto pr-2 pb-20">
            <!-- Populated by JS -->
            <div class="animate-pulse space-y-3">
              <div class="h-20 bg-white/5 rounded-2xl"></div>
              <div class="h-20 bg-white/5 rounded-2xl"></div>
              <div class="h-20 bg-white/5 rounded-2xl"></div>
            </div>
          </div>
        </div>

        <!-- Claims Column -->
        <div class="lg:col-span-8 h-full flex flex-col overflow-hidden">
          <div id="claimsContainer" class="h-full glass rounded-3xl overflow-hidden flex flex-col">
            <div id="claimsHeader" class="p-6 border-b border-white/5 bg-white/2">
              <h3 class="font-bold text-lg">User Submissions</h3>
              <p class="text-slate-500 text-sm">Select an employee to see their history.</p>
            </div>
            <div id="claimsList" class="flex-1 overflow-y-auto p-6 space-y-4">
              <div class="h-full flex flex-col items-center justify-center text-slate-500 text-center space-y-4">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center">
                   <svg class="w-8 h-8 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <p>No user selected.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const ea_token = localStorage.getItem('ea_token');
    const ea_username = localStorage.getItem('ea_username') || 'Admin';

    if (!ea_token || localStorage.getItem('ea_role') !== 'admin') {
      window.location.href = '/';
    }

    document.getElementById('adminName').textContent = ea_username;
    document.getElementById('adminAvatar').textContent = ea_username[0].toUpperCase();

    function logout() {
      ['ea_token','ea_role','ea_username','ea_user_id','ea_email'].forEach(k => localStorage.removeItem(k));
      window.location.href = '/';
    }

    function authHeaders() {
      return { 'Authorization': `Bearer ${ea_token}` };
    }

    let allUsers = [];
    let selectedUserId = null;

    async function loadUsers() {
      const container = document.getElementById('userList');
      try {
        const res = await fetch('/users', { headers: authHeaders() });
        if (res.status === 401 || res.status === 403) { logout(); return; }
        const data = await res.json();
        allUsers = data.users || [];
        renderUserList();
      } catch (e) {
        container.innerHTML = `<div class="text-red-400 p-4">Error: ${e.message}</div>`;
      }
    }

    function renderUserList() {
      const container = document.getElementById('userList');
      if (allUsers.length === 0) {
        container.innerHTML = '<div class="text-slate-500 p-8 text-center bg-white/5 rounded-2xl">No registered users found.</div>';
        return;
      }

      container.innerHTML = allUsers.map(user => `
        <button onclick="selectUser(${user.id}, '${user.username}')" 
                class="w-full text-left p-4 rounded-2xl border transition-all duration-200 group ${selectedUserId === user.id ? 'bg-blue-600/20 border-blue-500/50' : 'bg-white/5 border-white/5 hover:bg-white/10'}">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center font-bold text-slate-300 group-hover:scale-110 transition-transform">
              ${user.username[0].toUpperCase()}
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold truncate">${user.username}</p>
              <p class="text-xs text-slate-500 truncate">${user.email}</p>
            </div>
            <div class="text-right">
               <span class="text-[10px] uppercase tracking-wider text-slate-600 font-bold">${user.role}</span>
            </div>
          </div>
        </button>
      `).join('');
    }

    async function selectUser(userId, username) {
      selectedUserId = userId;
      renderUserList(); // Update highlight
      
      const header = document.getElementById('claimsHeader');
      const list = document.getElementById('claimsList');
      
      header.innerHTML = `
        <div class="flex items-center justify-between">
          <div>
            <h3 class="font-bold text-lg">${username}'s Submissions</h3>
            <p class="text-slate-500 text-sm">Review history and audit results for this employee.</p>
          </div>
          <span class="bg-blue-600/20 text-blue-300 px-3 py-1 rounded-lg text-xs font-bold border border-blue-500/30 uppercase tracking-widest">Employee Profile</span>
        </div>
      `;
      
      list.innerHTML = `<div class="h-full flex items-center justify-center"><div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>`;
      
      try {
        const res = await fetch(`/admin/users/${userId}/claims`, { headers: authHeaders() });
        if (res.status === 401 || res.status === 403) { logout(); return; }
        const data = await res.json();
        renderClaims(data.claims || []);
      } catch (e) {
        list.innerHTML = `<div class="text-red-400 p-4">Error: ${e.message}</div>`;
      }
    }

    function renderClaims(claims) {
      const list = document.getElementById('claimsList');
      if (claims.length === 0) {
        list.innerHTML = `
          <div class="h-full flex flex-col items-center justify-center text-slate-500 text-center space-y-2 opacity-50">
            <p>No claims found for this user.</p>
          </div>`;
        return;
      }

      list.innerHTML = claims.map(c => {
        const d = c.override_decision || c.decision || 'UNKNOWN';
        const colorMap = {
          APPROVED: 'text-emerald-400 border-emerald-500/20 bg-emerald-500/5',
          FLAGGED:  'text-amber-400 border-amber-500/20 bg-amber-500/5',
          REJECTED: 'text-red-400 border-red-500/20 bg-red-500/5',
        };
        const cls = colorMap[d] || 'text-slate-400 border-white/5 bg-white/2';
        
        return `
          <div class="p-5 rounded-2xl border border-white/5 bg-white/2 hover:bg-white/3 transition-colors group">
            <div class="flex items-start justify-between mb-4">
              <div>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">${c.expense_date || 'Unknown Date'}</p>
                <h4 class="font-bold text-white group-hover:text-blue-400 transition-colors">${c.merchant || 'Unknown Merchant'}</h4>
              </div>
              <div class="text-right">
                <p class="font-bold text-lg">${c.currency || 'USD'} ${parseFloat(c.amount || 0).toFixed(2)}</p>
                <span class="inline-block px-2 py-0.5 rounded text-[10px] font-bold border ${cls} mt-1">${d}</span>
              </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 text-xs">
               <div class="bg-black/20 rounded-xl p-3 border border-white/5">
                 <p class="text-slate-500 mb-1">AI Reasoning</p>
                 <p class="text-slate-300 italic">"${c.employee_message || c.primary_reason || 'No message provided.'}"</p>
               </div>
               <div class="bg-black/20 rounded-xl p-3 border border-white/5">
                 <p class="text-slate-500 mb-1">User Justification</p>
                 <p class="text-slate-300">"${c.justification || '—'}"</p>
               </div>
            </div>
            
            <div class="mt-4 pt-4 border-t border-white/5 flex items-center justify-between text-[10px]">
              <span class="text-slate-500">ID: #${c.id} &bull; CATEGORY: ${c.category || 'N/A'}</span>
              <a href="/dashboard" class="text-blue-400 hover:text-blue-300 font-bold uppercase tracking-widest">Go to Full Record &rarr;</a>
            </div>
          </div>
        `;
      }).join('');
    }

    loadUsers();
  </script>
</body>
</html>
